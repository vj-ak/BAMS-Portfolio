server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived immutable cache for hashed Next.js build assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Long-lived cache for static media (images, fonts, css, js)
    location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico|woff2?|ttf|otf|css|js|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri /index.html;
    }
}
